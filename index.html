    // ─── localStorage persistence ───
    async function storageGet(key) {
      try {
        const val = localStorage.getItem(key);
        if (val === null) throw new Error('not found');
        return { value: val };
      } catch(e) { throw e; }
    }
    async function storageSet(key, value) {
      try { localStorage.setItem(key, value); } catch(e) { console.warn('Storage failed', e); }

const ProgressRing = ({ value, max, size=56, stroke=4, color=C.indigo }) => {
const r = (size-stroke*2)/2;
const circ = 2*Math.PI*r;
const pct = Math.min(1, value/max);
return (
<svg width={size} height={size} style={{ transform:“rotate(-90deg)” }}>
<circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.border} strokeWidth={stroke} />
<circle cx={size/2} cy={size/2} r={r} fill=“none” stroke={color} strokeWidth={stroke}
strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap=“round”
style={{ transition:“stroke-dashoffset 0.5s ease” }} />
</svg>
);
};

if(first) setOpenPhase(first.phase);
}
},[]);
